version: 1
disable_existing_loggers: false

formatters:
  console-simple:
    format: "[%(levelname)s|%(filename)s] - %(message)s"

handlers:
  stdout-simple:
    class: logging.StreamHandler
    level: DEBUG
    formatter: console-simple
    stream: ext://sys.stdout

loggers:
  railcast:
    level: DEBUG
    propagate: yes

root:
  level: INFO
  handlers:
    - stdout-simple
